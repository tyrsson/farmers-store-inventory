<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | Farmers IMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="custom.css" />
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-body-secondary">

<div class="ims-login-wrap">

    <!-- Brand -->
    <div class="text-center mb-4">
        <div class="d-flex align-items-center justify-content-center gap-2 mb-2">
            <i class="bi bi-boxes fs-2 text-primary"></i>
            <span class="fs-4 fw-bold">Farmers IMS</span>
        </div>
        <div class="text-secondary small">Inventory Management System</div>
    </div>

    <!-- Card -->
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h1 class="h5 fw-bold mb-4 text-center">Sign In</h1>

            <form action="index.html" method="get" novalidate>

                <div class="mb-3">
                    <label class="form-label form-label-sm fw-semibold" for="login-email">Email</label>
                    <input
                        type="email"
                        class="form-control"
                        id="login-email"
                        placeholder="you@farmers-store.com"
                        autocomplete="email"
                        required
                    />
                </div>

                <div class="mb-4">
                    <label class="form-label form-label-sm fw-semibold" for="login-password">Password</label>
                    <div class="input-group">
                        <input
                            type="password"
                            class="form-control"
                            id="login-password"
                            placeholder="••••••••"
                            autocomplete="current-password"
                            required
                        />
                        <button
                            class="btn btn-outline-secondary"
                            type="button"
                            id="toggle-password"
                            aria-label="Toggle password visibility"
                        >
                            <i class="bi bi-eye" id="toggle-icon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-3">Sign In</button>

                <div class="text-center">
                    <a href="#" class="small text-secondary">Forgot your password?</a>
                </div>

            </form>
        </div>
    </div>

    <!-- Footer -->
    <div class="text-center mt-4 text-secondary" style="font-size:.75rem;">
        Farmers Home Furniture &copy; <span id="footer-year"></span> · v0.1.0-alpha
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.getElementById('footer-year').textContent = new Date().getFullYear();

  const pwInput  = document.getElementById('login-password');
  const toggleBtn = document.getElementById('toggle-password');
  const icon      = document.getElementById('toggle-icon');

  toggleBtn.addEventListener('click', () => {
    const isVisible = pwInput.type === 'text';
    pwInput.type  = isVisible ? 'password' : 'text';
    icon.className = isVisible ? 'bi bi-eye' : 'bi bi-eye-slash';
  });
</script>
</body>
</html>
