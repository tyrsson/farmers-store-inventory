services:
    mysql:
        build: docker/database/mysql
        ports:
            - 3306:3306
        environment:
            - MYSQL_DATABASE=${MYSQL_DB:-inventory_management_system}
            - MYSQL_USER=${MYSQL_USER:-ims}
            - MYSQL_PASSWORD=${MYSQL_PASSWORD:-ims}
            - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
        volumes:
            - mysql_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
            interval: 30s
            timeout: 60s
            retries: 5
            start_period: 80s

    phpmyadmin:
        image: phpmyadmin:latest
        ports:
            - 8082:80
        environment:
            - PMA_HOST=mysql
            - PMA_USER=root
            - PMA_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
        depends_on:
            - mysql

    mailpit:
        image: axllent/mailpit:latest
        ports:
            - 8025:8025  # web UI
            - 1025:1025  # SMTP

volumes:
    mysql_data:
        name: ims_mysql_data