services:
    php:
        build: docker/php
        volumes:
            - '.:/workspaces/farmers-store-inventory'
            - './docker/php/conf.d/xdebug.ini:/etc/php.d/xdebug.ini'
            - './docker/php/conf.d/error_reporting.ini:/etc/php.d/error_reporting.ini'
        expose:
            - 8080
        ports:
            - 8080:8080
        extra_hosts:
            - "host.docker.internal:host-gateway"
        restart: unless-stopped
        depends_on:
            - mysql

    mysql:
        build: docker/database/mysql
        ports:
            - 3306:3306
        environment:
            - MYSQL_DATABASE=${MYSQL_DB:-farmers_store}
            - MYSQL_USER=${MYSQL_USER:-farmers}
            - MYSQL_PASSWORD=${MYSQL_PASSWORD:-farmers}
            - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
            interval: 30s
            timeout: 60s
            retries: 5
            start_period: 80s

    phpmyadmin:
        image: phpmyadmin:latest
        ports:
            - 8082:80
        environment:
            - PMA_HOST=mysql
            - PMA_USER=root
            - PMA_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
        depends_on:
            - mysql