zend_extension = php_xdebug

[xdebug]
xdebug.mode = debug
xdebug.client_host = host.docker.internal
xdebug.start_with_request = yes
xdebug.log_level = 7
xdebug.log = /tmp/xdebug.log
; TrueAsync uses these exceptions for internal control flow (keep-alive timeout,
; cancellation); they are always caught and must not trigger the debugger.
xdebug.ignore_exception_classes = Async\OperationCanceledException,Async\AsyncCancellation